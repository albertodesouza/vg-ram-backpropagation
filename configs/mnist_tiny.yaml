# VG-RAM WNN — tiny MNIST experiment
# 100 balanced samples (10 per class), used for BOTH training and testing.
# Batch size: 10

data:
  dataset: mnist
  train_samples: 100
  test_samples: 100
  val_samples: 0
  batch_size: 10
  same_train_test: true        # test on the same 100 samples

network:
  input_size: 784
  num_classes: 10

  first_layer:
    num_neurons: 64
    num_synapses: 32
    num_entries: 100
    output_dim: 8              # 8-bit byte output (intermediate)

  intermediate_layers:
    count: 0                   # 0 = nenhuma camada intermediaria
    num_neurons: 48
    num_synapses: 32
    num_entries: 50
    output_dim: 8

  output_layer:
    num_neurons: 32
    num_synapses: 32
    num_entries: 100
    output_dim: 10             # 10-class output

training:
  epochs: 200
  lr: 0.01
  optimizer: adam
  tau_b_start: 1.0
  tau_b_end: 0.1
  tau_a_start: 1.0
  tau_a_end: 0.1
  beta_start: 1.0
  beta_end: 10.0
  lambda_bin_mem: 0.001
  lambda_bin_out: 0.001
  device: cuda                    # cpu | cuda | auto (auto = cuda se disponivel)
  seed: 42

wandb:
  enabled: true
  project: vgram-wnn
  run_name: tiny-100samples
  tags: [tiny, mnist]
  notes: "100 balanced samples (10/class), train=test"
